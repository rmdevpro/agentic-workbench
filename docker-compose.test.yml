# Test isolation compose override per §3.1
# Usage: docker compose -p workbench-test -f docker-compose.yml -f docker-compose.test.yml up -d

services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workbench-test-workbench-1
    ports:
      - '7867:3000'
    volumes:
      - workbench-test_data:/data
      - ./tests/fixtures/stub-claude.sh:/usr/local/bin/claude:ro
    environment:
      - PORT=3000
      - HOME=/data
      - WORKSPACE=/data/workspace
      - CLAUDE_HOME=/data/.claude
      - CLAUDE_CONFIG_DIR=/data/.claude
      - WORKBENCH_DATA=/data/.workbench
      - MAX_TMUX_SESSIONS=10
      - TMUX_CLEANUP_MINUTES=2
      - LOG_LEVEL=DEBUG
      # R3-N1 (Codex BLOCKER): resetBaseline in tests/helpers/reset-state.js
      # refuses to run unless WORKBENCH_TEST_SANDBOX=1 is set (safety guard
      # added in commit 2d6a67d to prevent accidental wipes of production
      # /data on M5/dev or hf-prod). Setting it here means any operator
      # running the documented test compose picks it up automatically;
      # manual runs against shared deployments still fail loud.
      - WORKBENCH_TEST_SANDBOX=1
    networks:
      - workbench-test
    dns:
      - 127.0.0.1
    restart: 'no'

networks:
  workbench-test:
    driver: bridge

volumes:
  workbench-test_data:
